name: Deploy Web to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Godot Export
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          relative_project_path: ./
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          archive_output: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install butler & publish
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip && chmod +x butler
          ./butler push "${{ steps.export.outputs.archive_directory }}/Web.zip" "${{ vars.ITCH_USER }}/${{ vars.ITCH_GAME }}:web"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
